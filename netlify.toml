[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[[edge_functions]]
  function = "social-preview"
  path = "/guides"

[[edge_functions]]
  function = "social-preview"
  path = "/guides/detail/*"

[[edge_functions]]
  function = "social-preview"
  path = "/builds"

[[edge_functions]]
  function = "social-preview"
  path = "/builds/detail/*"

[[edge_functions]]
  function = "social-preview"
  path = "/raids/detail/*"

[[edge_functions]]
  function = "social-preview"
  path = "/creators"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
