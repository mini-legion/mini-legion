    <rect x="406" y="752" width="74" height="84" fill="#e5e7eb"/><text x="443" y="806">🐗</text>
  </g>

  <rect x="78" y="854" width="130" height="62" rx="4" fill="#2573dd"/>
  <text x="143" y="884" text-anchor="middle" class="font w" font-size="25">2 Specs</text>
  <text x="143" y="908" text-anchor="middle" class="font w" font-size="14">with 4 branches</text>
  <text x="78" y="940" class="font s">• Core stats: STR all forms</text>
  <text x="78" y="958" class="font s">• Weapon: Staff &amp; Polearm</text>
  <text x="78" y="976" class="font s">• SP Class with energy</text>

  <rect x="228" y="854" width="156" height="38" rx="4" fill="#90e0a8"/>
  <text x="306" y="878" text-anchor="middle" class="font b" font-size="13">Balance: SP Caster / Healer</text>
  <rect x="398" y="854" width="146" height="38" rx="4" fill="#7c3f00"/>
  <text x="471" y="878" text-anchor="middle" class="font w" font-size="13">Feral: Physic DPS / Tank</text>

