    <rect x="154" y="656" width="74" height="88" fill="#e5e7eb"/><text x="191" y="712">🌿</text>
    <rect x="238" y="656" width="74" height="88" fill="#e5e7eb"/><text x="275" y="712">🐆</text>
    <rect x="322" y="656" width="74" height="88" fill="#e5e7eb"/><text x="359" y="712">🦉</text>
    <rect x="406" y="656" width="74" height="88" fill="#e5e7eb"/><text x="443" y="712">🐻</text>
    <rect x="154" y="752" width="74" height="84" fill="#e5e7eb"/><text x="191" y="806">🧙</text>
    <rect x="238" y="752" width="74" height="84" fill="#e5e7eb"/><text x="275" y="806">🦌</text>
