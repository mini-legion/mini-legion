  <rect x="78" y="1132" width="66" height="176" rx="4" fill="#08c5e8"/>
  <text x="111" y="1224" text-anchor="middle" class="font b" font-size="14">Skins</text>
  <g class="font b" font-size="28" text-anchor="middle">
    <rect x="154" y="1132" width="78" height="84" fill="#e5e7eb"/><text x="193" y="1186">🧝</text>
    <rect x="238" y="1132" width="78" height="84" fill="#e5e7eb"/><text x="277" y="1186">🐾</text>
    <rect x="322" y="1132" width="78" height="84" fill="#e5e7eb"/><text x="361" y="1186">🟢</text>
    <rect x="406" y="1132" width="78" height="84" fill="#e5e7eb"/><text x="445" y="1186">🦉</text>
    <rect x="154" y="1224" width="78" height="84" fill="#e5e7eb"/><text x="193" y="1278">🔵</text>
    <rect x="238" y="1224" width="78" height="84" fill="#e5e7eb"/><text x="277" y="1278">❄️</text>
    <rect x="322" y="1224" width="78" height="84" fill="#e5e7eb"/><text x="361" y="1278">🧊</text>
    <rect x="406" y="1224" width="78" height="84" fill="#e5e7eb"/><text x="445" y="1278">💙</text>
  </g>
  <text x="78" y="1328" class="font muted" font-size="11">More skins are coming...</text>

  <rect x="78" y="1378" width="466" height="90" rx="8" fill="#8b4b34" stroke="#5b2e1e" stroke-width="3"/>
  <text x="311" y="1438" text-anchor="middle" class="font" font-size="44" font-weight="900" fill="#ffd65a">Optimization</text>

  <text x="78" y="1510" class="font s"><tspan class="b">*Crash issue:</tspan> Download newest version in Google Play/App Store</text>
  <text x="78" y="1530" class="font s">to enjoy mini legion without crashes and shorter loading time.</text>
  <text x="78" y="1572" class="font s b">*Class Buff:</text>
  <text x="94" y="1594" class="font s b">1. Shaman:</text>
  <text x="94" y="1614" class="font s"><tspan class="b">[Overload]</tspan> Trigger rate 7/14/21/28/35% → <tspan class="orange b">10/20/30/40/50%</tspan></text>
  <text x="94" y="1634" class="font s"><tspan class="b">[Empowered Windfury Weapon]</tspan> 3/6/10% → <tspan class="orange b">5/10/15%</tspan></text>
  <text x="94" y="1660" class="font s b">2. Mage:</text>
  <text x="94" y="1680" class="font s"><tspan class="b">[Ice Lance]</tspan> Mana cost 200 → <tspan class="orange b">120</tspan></text>
  <text x="94" y="1700" class="font s"><tspan class="b">[Biting Cold]</tspan> <tspan class="orange b">Add new effect: Crit DMG +4/8%</tspan></text>
  <text x="94" y="1720" class="font s"><tspan class="b">[Fanatical Spell]</tspan> <tspan class="orange b">Add new effect: Ignite DMG +5/10/15/20/25%,</tspan></text>
  <text x="94" y="1740" class="font s orange b">with 20/40/60/80/100% chance to spread ignite to 5 extra targets</text>
  <text x="94" y="1764" class="font s"><tspan class="b">[Frozen Lance]</tspan> <tspan class="green b">will no longer increase Frostfire Bolt's Crit DMG.</tspan></text>
  <text x="94" y="1784" class="font s orange b">New effect: Ice Lance can shoot Ice Spike to up to 3 targets</text>
  <text x="94" y="1804" class="font s orange b">within 20 yards, with 10/20/30/40/50% damage.</text>
  <text x="94" y="1830" class="font s b">3. Hunter:</text>
  <text x="94" y="1850" class="font s"><tspan class="b">[Serpent Sting]</tspan> Mana cost 250 → <tspan class="orange b">200</tspan></text>
  <text x="94" y="1870" class="font s"><tspan class="b">[Stormshot]</tspan> Basic Cooldown -3s, damage <tspan class="green b">-20%</tspan></text>
  <text x="94" y="1890" class="font s blue b">[Hunting Stimulus] → [Trample]:</text>
  <text x="110" y="1910" class="font s blue b">Your pet's attack deals extra physical damage equal to AP*4/8/12/16/20%.</text>
  <text x="110" y="1930" class="font s blue b">Wild Charge and Rake trigger trample with 20/40/60/80/100% chance.</text>
  <text x="110" y="1950" class="font s blue b">Trample: deal AP*30% physical damage to up to 9 targets within 15 yards.</text>

  <rect x="16" y="1662" width="52" height="146" rx="4" fill="#ef6746"/>
  <text x="42" y="1712" text-anchor="middle" class="font w" font-size="17">More</text>
  <text x="42" y="1748" text-anchor="middle" class="font w" font-size="17">in</text>
  <text x="42" y="1784" text-anchor="middle" class="font w" font-size="17">June</text>

  <rect x="78" y="1662" width="466" height="66" rx="4" fill="#2573dd"/>
  <text x="311" y="1704" text-anchor="middle" class="font w" font-size="26">New Gameplay: World wide Boss Hunt</text>
  <rect x="78" y="1738" width="466" height="66" rx="4" fill="#fff200"/>
  <text x="311" y="1780" text-anchor="middle" class="font h" font-size="26">To be continued</text>

  <text x="280" y="2024" text-anchor="middle" class="font muted" font-size="11">Integrated for minilegionguides.com • Visual summary based on the official June roadmap</text>
