  <rect x="16" y="16" width="528" height="44" rx="4" fill="#fff7db" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="112" cy="38" r="18" fill="#f97316" stroke="#b45309" stroke-width="2"/>
  <text x="112" y="44" text-anchor="middle" class="font w" font-size="12">ML</text>
  <text x="140" y="46" class="font h" font-size="22">&lt;Mini Legion&gt; Roadmap 2026</text>

  <rect x="16" y="68" width="528" height="32" rx="4" fill="#9ee6b6"/>
  <text x="280" y="90" text-anchor="middle" class="font b muted" font-size="16">&gt;&gt;Feral Balance&lt;&lt;</text>

  <rect x="16" y="104" width="52" height="482" rx="4" fill="#ef6746"/>
  <text x="42" y="344" text-anchor="middle" class="font w" font-size="17">This</text>
  <text x="42" y="366" text-anchor="middle" class="font w" font-size="17">Week</text>

  <rect x="80" y="104" width="66" height="372" rx="4" fill="#2573dd"/>
  <text x="113" y="268" text-anchor="middle" class="font w" font-size="14">Home</text>
  <text x="113" y="288" text-anchor="middle" class="font w" font-size="14">coming</text>
  <text x="113" y="326" text-anchor="middle" class="font w" font-size="14">Event</text>

  <text x="158" y="118" class="font t">For accounts that have not logged in for <tspan class="orange b">30 days:</tspan></text>
  <text x="158" y="140" class="font s muted">2 following options for homecoming</text>
  <text x="158" y="164" class="font t">• Restart in the newest server</text>
  <text x="170" y="184" class="font s">1. Heritage the <tspan class="orange b">1st topup rewards</tspan> from the old server</text>
  <text x="170" y="204" class="font s">2. Elf Supply <tspan class="orange b">40% OFF</tspan> old server total topup &gt;$14.99</text>
  <text x="170" y="224" class="font s">3. 72h <tspan class="orange b">Ads Free</tspan></text>
  <text x="170" y="244" class="font s">4. Exclusive homecoming event, <tspan class="orange b">Massive rewards</tspan></text>
  <text x="170" y="264" class="font s orange b">Free Spectral Tiger, Free &amp; Early Heirloom piece</text>
  <text x="158" y="288" class="font s muted">With these rewards you can easily get ahead, 1st kill and</text>
  <text x="158" y="306" class="font s muted">rewrite the legend in the newest server.</text>
  <text x="158" y="332" class="font t">• Stay in old server</text>
  <text x="170" y="352" class="font s">1. Exclusive homecoming event</text>
  <text x="170" y="372" class="font s">2. Massive rewards</text>

  <text x="158" y="408" class="font t b">For all players</text>
  <text x="158" y="430" class="font s">• Hero assemble</text>
  <text x="170" y="450" class="font s">1. Invite your old friend back to Mini Legion</text>
  <text x="170" y="470" class="font s">2. Get <tspan class="orange b">massive rewards</tspan> based on invited players</text>
  <text x="170" y="490" class="font s orange b">number &amp; activeness</text>

  <rect x="80" y="482" width="66" height="104" rx="4" fill="#fff200"/>
  <text x="113" y="540" text-anchor="middle" class="font b" font-size="14">Others</text>
  <text x="158" y="504" class="font s"><tspan class="b">1. Crash fix:</tspan> Download newest Mini Legion version</text>
  <text x="158" y="524" class="font s">to enjoy the game without crash bothering</text>
  <text x="158" y="548" class="font s"><tspan class="b">2. More exchange-able Items:</tspan></text>
  <text x="166" y="568" class="font s">• Mys Merchant: Legendary ring of NAXX</text>
  <text x="166" y="588" class="font s">• Craftroom: Abyss Mount of NAXX</text>

  <rect x="16" y="594" width="52" height="1060" rx="4" fill="#f05293"/>
  <text x="42" y="1214" text-anchor="middle" class="font w" font-size="17">3rd</text>
  <text x="42" y="1240" text-anchor="middle" class="font w" font-size="17">Week</text>
  <text x="42" y="1296" text-anchor="middle" class="font w" font-size="17">of</text>
  <text x="42" y="1322" text-anchor="middle" class="font w" font-size="17">June</text>

  <rect x="78" y="594" width="466" height="54" rx="4" fill="#27b965"/>
  <circle cx="224" cy="621" r="18" fill="#9a4f18" stroke="#111827" stroke-width="2"/>
  <text x="254" y="630" class="font w" font-size="28">New Class</text>

  <rect x="78" y="656" width="66" height="180" rx="4" fill="#7c3f00"/>
