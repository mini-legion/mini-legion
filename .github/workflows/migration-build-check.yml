name: Migration build check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Upload original archive parts
        uses: actions/upload-artifact@v4
        with:
          name: original-public-archive
          path: |
            frontend/public/data/public-data.00.b64
            frontend/public/data/public-data.01.b64
          if-no-files-found: error

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --silent

      - name: Recover static public datasets once
        if: ${{ hashFiles('frontend/public/data/guides.json') == '' }}
        run: node scripts/repair-public-archive.mjs 2>&1 | tee archive-repair.log; test ${PIPESTATUS[0]} -eq 0

      - name: Commit recovered public datasets
        if: ${{ hashFiles('frontend/public/data/guides.json') == '' }}
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*.json
          git commit -m "Store recovered public datasets as static JSON"
          git push

      - name: Build
        run: npm run build 2>&1 | tee build.log; test ${PIPESTATUS[0]} -eq 0

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            frontend/archive-repair.log
            frontend/build.log
          if-no-files-found: ignore
