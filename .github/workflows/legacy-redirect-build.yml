name: Legacy redirect build check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --ignore-scripts
      - run: npm run build
      - run: |
          test -f dist/index.html
          test -f dist/_redirects
          test -f dist/robots.txt
          grep -q 'www.minilegion.online' dist/index.html
          grep -q '/\* /index.html 200' dist/_redirects
